services:
  alexa_control:
    build: ./alexa-controller-app
    container_name: alexa_control
    restart: unless-stopped
    env_file:
      - ./.env
    environment:
      SET_REFRESH_TOKEN: "${SET_REFRESH_TOKEN}"
    ports:
      - "3001:3001"
    volumes:
      - ./data:/app/data
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:3001/api/status -H \"X-API-Key: $${HA_API_KEY}\" || exit 1"]
      interval: 60s
      timeout: 10s
      retries: 3
      start_period: 30s
